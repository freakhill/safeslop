name: Go

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check
        run: make check

      - name: Build
        run: make build
