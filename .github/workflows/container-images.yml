name: Container Images

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  locked-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate locked build inputs
        run: make check-assets check-npm-locks check-proxy-image-lock

      - name: Build representative locked images
        run: make test-container-images
