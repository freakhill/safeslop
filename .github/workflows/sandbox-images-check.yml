name: Sandbox Images Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deliberately NOT using docker/setup-buildx-action. Buildx's
      # buildkit driver doesn't share intermediate local/* tags between
      # targets, so `compose build agent agent-tools` fails when
      # agent-tools resolves `FROM local/agent-sandbox:latest` (the
      # tag agent just produced doesn't exist in buildkit's image
      # store, only in the daemon's). The legacy daemon-side builder
      # (which `docker compose build` falls back to without buildx)
      # tags into the daemon and the second build's FROM lookup hits.

      # agent-tools.env is gitignored (the user's local override of
      # .example). Seed it from the example so compose's --env-file
      # finds something to read; the build's pinned versions come from
      # the .example values either way.
      - name: Seed agent-tools.env from example
        run: cp library/layer/container/agent-tools.env.example library/layer/container/agent-tools.env

      # Build agent + agent-tools together. Dockerfile.agent.tools begins
      # with `FROM local/agent-sandbox:latest`, and with buildx as the
      # builder (set up above), separate `docker compose build` calls
      # don't share intermediate tags — the second invocation can't
      # resolve `local/agent-sandbox:latest` and treats it as a missing
      # registry image. Listing both services in one invocation forces
      # the FROM-dep to be satisfied within the same buildkit run.
      # Same fix as scripts/slop-agent-sandbox-tools.fish (commit 8c9f244).
      - name: Build base + tools sandbox images
        run: docker compose --env-file library/layer/container/agent-tools.env -f library/layer/container/docker-compose.yml build agent agent-tools
