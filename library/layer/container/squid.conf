http_port 3128

# Basic protocol safety
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Egress policy: deny by default, allow known registries/providers.
# -n disables reverse DNS for IP-based URLs; IP literals are denied below.
acl allowed_domains dstdomain -n "/etc/squid/allowlist.domains"

# Block metadata and loopback style destinations explicitly.
acl blocked_dst dst 127.0.0.0/8
acl blocked_dst dst 169.254.0.0/16
acl blocked_dst dst 10.0.0.0/8
acl blocked_dst dst 172.16.0.0/12
acl blocked_dst dst 192.168.0.0/16

acl ip_literal_dst dstdom_regex -n ^[0-9]+(\.[0-9]+){3}$ ^[0-9A-Fa-f:.]*:[0-9A-Fa-f:.]+$ ^\[[0-9A-Fa-f:.]+\]$
http_access deny blocked_dst
http_access deny ip_literal_dst
http_access allow allowed_domains
http_access deny all

# Reduce proxy information leakage.
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
