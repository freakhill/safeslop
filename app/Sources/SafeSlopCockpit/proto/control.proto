syntax = "proto3";
package safeslop.control.v1;
option go_package = "github.com/freakhill/safeslop/internal/engine/control/pb;pb";

// Control is the app<->engine control plane (gRPC over a Unix-domain socket).
service Control {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc Launch(LaunchRequest) returns (stream LaunchEvent);
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc Attach(stream ClientFrame) returns (stream ServerFrame);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc Trust(TrustRequest) returns (TrustResponse);
  rpc Untrust(UntrustRequest) returns (UntrustResponse);
  rpc InstallPlan(InstallPlanRequest) returns (InstallPlanResponse);
  rpc InstallApply(InstallApplyRequest) returns (stream InstallApplyEvent);
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc InstallTool(InstallToolRequest) returns (stream InstallToolEvent);
  rpc ValidatePolicy(ValidatePolicyRequest) returns (ValidatePolicyResponse);
  rpc ListPresets(ListPresetsRequest) returns (ListPresetsResponse);
  rpc PreflightHostLaunch(PreflightHostLaunchRequest) returns (PreflightHostLaunchResponse);
}

message PingRequest {}
message PingResponse { string version = 1; }

message ListProfilesRequest { string config_path = 1; } // dir holding safeslop.cue; empty = server cwd
message Profile {
  string name = 1;
  string agent = 2;
  string environment = 3;
  string network = 4;
  string tier = 5;          // honest isolation tier from policy.EnvTier (e.g. "mistake-guard")
  string tier_note = 6;     // the one-line honest caveat from policy.EnvTier
  string trust_status = 7;  // per-policy trust gate state: "trusted" | "untrusted" | "changed"
  string config_dir = 8;    // abs dir holding this safeslop.cue (the cockpit runs `safeslop run` here)
  string risk_headline = 9; // arbiter one-liner consequence (policy.RiskSummary)
  string risk_level = 10;   // "high" | "elevated" | "contained" — for color only
  repeated string risk_lines = 11; // break-glass consequence sentences
  repeated string tech_stack = 12; // underlying technologies (policy.TechStack) — Launch hover tooltip
  repeated RiskAxis risk_axes = 13; // per-dimension restriction status — Launch shows the unrestricted ones loud
}
// RiskAxis is one capability dimension's restriction status (policy.RiskAxes). The GUI shows the
// unrestricted ones (restricted=false) as loud amber/red chips — what's OPEN, as prominently as the
// meta line shows what's bounded (ayo S2).
message RiskAxis {
  string name = 1;       // "network" | "files"
  string value = 2;      // short status, e.g. "unrestricted", "open egress", "whole account"
  bool restricted = 3;   // true = bounded; false = unrestricted/open (the loud case)
  string severity = 4;   // "high" | "elevated" | "contained" — color only; value carries the meaning
}
message ListProfilesResponse { repeated Profile profiles = 1; }

message LaunchRequest {
  string profile = 1;
  string config_path = 2;
}
message LaunchEvent {
  enum Kind {
    SPAWNED = 0;
    EXITED = 1;
    ERROR = 2;
  }
  Kind kind = 1;
  string message = 2;
  int32 exit_code = 3;
}

// OpenSession opens an isolated agent session and allocates its PTY. Non-blocking.
message OpenSessionRequest {
  string profile = 1;
  string config_path = 2;
  uint32 cols = 3;
  uint32 rows = 4;
}
message OpenSessionResponse { string session_id = 1; }

// Attach is a long-lived bidi stream: the first ClientFrame carries attach_session_id;
// subsequent client frames are input/resize, server frames are output until exited.
message Resize { uint32 cols = 1; uint32 rows = 2; }
message ClientFrame {
  oneof msg {
    string attach_session_id = 1; // MUST be the first frame
    bytes  input = 2;             // bytes typed into the PTY
    Resize resize = 3;            // terminal resized
  }
}
message Exited { int32 exit_code = 1; }
message ServerFrame {
  oneof msg {
    bytes  output = 1;            // PTY output bytes
    Exited exited = 2;            // agent exited; stream ends after this
  }
}

message CloseSessionRequest { string session_id = 1; }
message CloseSessionResponse {}

// Trust records host-side approval of a repo's safeslop.cue (its exact bytes), so a
// subsequent OpenSession/Launch for that policy passes the fail-closed trust gate.
// The GUI calls this after the user reviews and approves (specs/0024 S1a follow-on).
message TrustRequest { string config_path = 1; } // dir/file holding safeslop.cue; empty = server cwd
message TrustResponse { string trusted_path = 1; } // absolute path that was approved

// Untrust removes a repo's recorded approval (trust.Store.Revoke), so the next list shows it untrusted
// and a launch re-gates through the trust sheet. The reverse of Trust — symmetric revoke (ayo #3). The
// peer is uid/process-tree-checked at Accept, so a sandboxed agent can't revoke (or grant) on its own.
message UntrustRequest { string config_path = 1; }  // dir/file holding safeslop.cue; empty = server cwd
message UntrustResponse { string untrusted_path = 1; } // absolute path whose approval was removed

// InstallPlan returns the pinned desired-state diff (the SP7b-2 plan) for the wizard to preview.
message InstallAction {
  string name = 1;
  string kind = 2;    // install | upgrade | ok
  string current = 3;
  string desired = 4;
}
message InstallPlanRequest {}
message InstallPlanResponse { repeated InstallAction actions = 1; }

// InstallApply streams progress while it downloads, verifies (fail-closed), and installs.
message InstallApplyRequest {}
message InstallApplyEvent {
  enum Kind { START = 0; PROGRESS = 1; DONE = 2; ERROR = 3; }
  Kind kind = 1;
  string tool = 2;
  string msg = 3;
}

// ListTools returns the Installs-tab catalog with read-only detection of what's already present and
// how it was installed. A present tool is reported with its source and is NOT installable, so safeslop
// never clobbers an existing install (internal/engine/tools).
message ListToolsRequest {
  bool catalog_only = 1; // true = instant catalog with detection deferred (Source "unknown")
}
message ToolStatus {
  string name = 1;
  string category = 2;
  string note = 3;
  bool present = 4;
  string source = 5;        // brew | cask | app | standalone | missing
  string path = 6;
  bool installable = 7;     // true only when missing AND a route exists (no-clobber)
  string install_hint = 8;  // the command that would run, e.g. "brew install uv" (display only)
  repeated string shadowed_paths = 9; // other same-name executables later on PATH (shadowed by `path`)
}
message ListToolsResponse { repeated ToolStatus tools = 1; }

// InstallTool installs ONE missing catalog tool by name, streaming combined output lines. Refuses a
// present tool. People pick tools one at a time — there is no install-everything RPC.
message InstallToolRequest { string name = 1; }
message InstallToolEvent {
  enum Kind { LINE = 0; DONE = 1; ERROR = 2; }
  Kind kind = 1;
  string line = 2;
}

// ValidatePolicy vets unsaved safeslop.cue TEXT from the editor (policy.LoadBytes), returning a
// cue-vet-quality error or the parsed profiles each tagged with their tier + arbiter risk summary —
// the live feedback loop for the Create tab. trust_status/config_dir are empty (text isn't on disk).
message ValidatePolicyRequest { string cue_text = 1; }
message ValidatePolicyResponse {
  bool valid = 1;
  string error = 2;             // empty when valid; cue/errors.Details otherwise
  repeated Profile profiles = 3;
}

// ListPresets returns the bundled premade policies (the "stdlib") the Create tab offers as starting
// points (policy.Presets). Each is a complete, validated safeslop.cue.
message ListPresetsRequest {}
message Preset {
  string name = 1;
  string summary = 2; // one-line description (not "description" — SwiftProtobuf reserves that)
  string cue = 3;
}
message ListPresetsResponse { repeated Preset presets = 1; }

// PreflightHostLaunch authors the per-launch host comprehension gate (specs/0030). It is host-tier ONLY
// — calling it for a more-isolated profile is an error — and it is a pure read: nothing is recorded, so
// re-entering the gate re-draws fresh statements (consent is per-launch, never persisted). The engine
// authors every sentence and sets every `expected`, so the affirmed text can't drift from what runs.
message PreflightHostLaunchRequest {
  string profile = 1;
  string config_path = 2; // dir holding safeslop.cue; empty = server cwd
}
message ConsentStatement {
  string text = 1;
  bool expected = 2;       // ground truth: is this statement TRUE of this host run?
  string tier_origin = 3;  // "host" for the true rows; a more-isolated tier for the false decoys
}
message PreflightHostLaunchResponse {
  string headline_body = 1;                 // fixed honesty anchor — always true, never answerable
  string scope_line = 2;                    // per-launch live-state line (varies run to run)
  repeated ConsentStatement statements = 3; // pre-shuffled rows, guaranteed >=1 true + >=1 false decoy
}
