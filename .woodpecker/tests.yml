# Fish test suite, native on the darwin/arm64 agent (the toolkit's real target;
# this is exactly `fish tests/run.fish` from the local verify checklist).
# Local backend: the agent host must have fish + uv on PATH.
when:
  - event: push
    branch: main
  - event: pull_request
labels:
  platform: darwin/arm64
steps:
  - name: fish-tests
    commands:
      - fish tests/run.fish
