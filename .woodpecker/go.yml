# Go engine: vet, format, build, and test on the supported native darwin/arm64
# agent. This mirrors the local `make check` / `make build` exactly.
#
# Runs on Woodpecker's local backend (commands execute on the agent host), so the
# host must have the Go toolchain + make on PATH. (If your Woodpecker predates the
# `labels:` filter, use a top-level `platform: darwin/arm64` instead.)
when:
  - event: push
    branch: main
  - event: pull_request
labels:
  platform: darwin/arm64
steps:
  - name: check
    commands:
      - make check   # complete local static/unit/Emacs contract gate
      - make build   # static CGO_ENABLED=0 binary
