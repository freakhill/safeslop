# Cockpit (SwiftUI app) build. Native on the darwin/arm64 worker (the only place it CAN build).
# Needs swift + protoc on the worker host (the gRPC codegen plugin shells out to protoc). Catches
# GUI / control.proto regressions that `make check` can't. Path-filtered so Go-only pushes skip it.
when:
  - event: push
    branch: main
    path:
      include: ['app/**', 'internal/engine/control/control.proto', '.woodpecker/cockpit.yml']
  - event: pull_request
    path:
      include: ['app/**', 'internal/engine/control/control.proto', '.woodpecker/cockpit.yml']
labels:
  platform: darwin/arm64
steps:
  - name: swift-build
    commands:
      - cd app && swift build
