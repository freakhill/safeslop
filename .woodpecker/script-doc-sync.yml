# script/docs/skills/tests sync gate. Port of .github/workflows/script-doc-sync-check.yml.
# When scripts/*.fish or scripts/_py/*.py change, README.md + skills + tests must
# change too. Native on darwin/arm64 (host git + POSIX sh); uses Woodpecker's CI_*
# vars and falls back to a full-tree check if the diff base is unavailable.
when:
  - event: push
    branch: main
  - event: pull_request
labels:
  platform: darwin/arm64
steps:
  - name: sync-check
    commands:
      - |
        set -eu
        event="${CI_PIPELINE_EVENT:-}"
        if [ "$event" = "pull_request" ]; then
          git fetch -q origin "$CI_COMMIT_TARGET_BRANCH" || true
          base="$(git merge-base FETCH_HEAD HEAD 2>/dev/null || true)"
        else
          base="${CI_PREV_COMMIT_SHA:-}"
        fi
        if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
          echo "diff base unavailable; checking the full tree."
          changed="$(git ls-files)"
        else
          changed="$(git diff --name-only "$base" HEAD)"
        fi
        echo "Changed files:"
        printf '%s\n' "$changed"
        if ! printf '%s\n' "$changed" | grep -Eq '^scripts/.*\.fish$|^scripts/_py/.*\.py$'; then
          echo "No script changes detected; sync check not required."
          exit 0
        fi
        doc=false; skill=false; tst=false
        if printf '%s\n' "$changed" | grep -Eq '^README\.md$'; then doc=true; fi
        if printf '%s\n' "$changed" | grep -Eq '^skills/.*/SKILL\.md$|^skills/README\.md$'; then skill=true; fi
        if printf '%s\n' "$changed" | grep -Eq '^tests/.*\.fish$'; then tst=true; fi
        if [ "$doc" != true ] || [ "$skill" != true ] || [ "$tst" != true ]; then
          echo "Script change detected without required sync updates." >&2
          echo "Required with scripts/*.fish or scripts/_py/*.py changes:" >&2
          echo "  - README.md" >&2
          echo "  - skills/*/SKILL.md or skills/README.md" >&2
          echo "  - tests/*.fish" >&2
          exit 1
        fi
        echo "Script/docs/skills/tests sync check passed."
