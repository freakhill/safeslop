# README <-> fish-script --help drift gate. Native on darwin/arm64 (host fish + uv).
# Fix locally with: fish scripts/slop-sync-help.fish sync
when:
  - event: push
    branch: main
  - event: pull_request
labels:
  platform: darwin/arm64
steps:
  - name: help-sync
    commands:
      - fish scripts/slop-sync-help.fish check
